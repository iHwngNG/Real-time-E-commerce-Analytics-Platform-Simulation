  #      REDIS_URL: redis://redis:6379
  #      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #      LOG_LEVEL: ${LOG_LEVEL:-INFO}
  #    ports:
  #      - "8000:8000"
  #    networks:
  #      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 4 — UI
  # ════════════════════════════════════════════════════════════════════════════

  # React Dashboard — F8 · localhost:3000
  #  dashboard:
  #    build:
  #      context: ./dashboard
  #      dockerfile: Dockerfile
  #    container_name: ecommerce_dashboard
  #    restart: on-failure
  #    depends_on:
  #      - api
  #    ports:
  #      - "3000:3000"
  #    environment:
  #      VITE_API_URL: http://localhost:8000
  #      VITE_WS_URL: ws://localhost:8000
  #    networks:
  #      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 5 — OBSERVABILITY
  # ════════════════════════════════════════════════════════════════════════════

  # Prometheus — F9.2 · localhost:9090
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - ecommerce_net

  # Grafana — F9.2 · localhost:3001
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # MANUAL-TRIGGER SERVICES (profile: tools)
  # Run via: docker compose run --rm simulator --mode seed
  #          docker compose run --rm simulator --mode simulate
  #          docker compose run --rm simulator --mode both
  # ════════════════════════════════════════════════════════════════════════════

  # Simulator — F1 · không tự start, chạy qua `make seed` / `make simulate`
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: ecommerce_simulator
    profiles:
      - tools
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      NUM_USERS: ${NUM_USERS:-10000}
      NUM_PRODUCTS: ${NUM_PRODUCTS:-5000}
      NUM_ACTIVE_USERS: ${NUM_ACTIVE_USERS:-100}
      TARGET_EVENTS_PER_SEC: ${TARGET_EVENTS_PER_SEC:-500}
      PEAK_HOUR_ENABLED: ${PEAK_HOUR_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - ecommerce_net

# ════════════════════════════════════════════════════════════════════════════
# NAMED VOLUMES
# ════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    name: ecommerce_postgres_data
  redis_data:
    name: ecommerce_redis_data
  kafka_data:
    name: ecommerce_kafka_data
  spark_checkpoints:
    name: ecommerce_spark_checkpoints
  airflow_logs:
    name: ecommerce_airflow_logs
  prometheus_data:
    name: ecommerce_prometheus_data
  grafana_data:
    name: ecommerce_grafana_data

# ════════════════════════════════════════════════════════════════════════════
# NETWORK
# ════════════════════════════════════════════════════════════════════════════

networks:
  ecommerce_net:
    name: ecommerce_net
    driver: bridge
