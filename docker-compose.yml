# =============================================================================
# Real-time E-commerce Analytics Platform — Docker Compose Stack
# =============================================================================
# Startup order (enforced by healthchecks):
#   Layer 0 (infra)     : postgres · redis · kafka
#   Layer 1 (init)      : storage-init · kafka-init · akhq
#   Layer 2 (processing): streaming · airflow-init → airflow-webserver · airflow-scheduler
#   Layer 3 (serving)   : api
#   Layer 4 (ui)        : dashboard
#   Layer 5 (observ.)   : prometheus · grafana
#
# Usage:
#   docker compose up -d          → start full stack
#   docker compose up -d postgres redis kafka akhq  → infra only
#   docker compose run --rm simulator seed          → seed data (F1.5)
#   docker compose run --rm simulator simulate      → start event stream (F1.3)
# =============================================================================

services:

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 0 — INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-ecommerce}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce_net

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ecommerce_net

  # Kafka KRaft mode (no Zookeeper) — F2.2.1
  kafka:
    image: apache/kafka:3.7.1
    container_name: ecommerce_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Disable auto-create — topics created explicitly by kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092" # internal (container-to-container)
      - "29092:29092" # external (host access)
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 1 — INIT SERVICES
  # ════════════════════════════════════════════════════════════════════════════

  # Create Kafka topics idempotently — F2.2.3
  # Script: infra/kafka/init-topics.sh
  # Topics: raw-events (6p/24h) · aggregated-metrics (3p/48h) · dead-letter-queue (1p/72h)
  kafka-init:
    image: apache/kafka:3.7.1
    container_name: ecommerce_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
    volumes:
      - ./infra/kafka/init-topics.sh:/init-topics.sh:ro
    command: bash /init-topics.sh
    networks:
      - ecommerce_net

  # Run PostgreSQL migrations — F4.4
  storage-init:
    image: python:3.12-slim
    container_name: ecommerce_storage_init
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./storage:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
    command: >
      bash -c "
        pip install psycopg2-binary --quiet &&
        python run_migrations.py
      "
    networks:
      - ecommerce_net

  # Kafka UI — F2.2.2 · localhost:8080
  akhq:
    image: tchiotludo/akhq:latest
    container_name: ecommerce_akhq
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            ecommerce-kafka:
              properties:
                bootstrap.servers: "kafka:9092"
    ports:
      - "8080:8080"
    networks:
      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 2 — STREAM PROCESSING & ORCHESTRATION
  # ════════════════════════════════════════════════════════════════════════════

  # PySpark Structured Streaming — F3
  streaming:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: ecommerce_streaming
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - ecommerce_net

  # Airflow init — migrate DB + create admin user — F5.4
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ecommerce_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9z6xRFkA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-ecommerce-analytics-secret}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin123}
    command: version
    networks:
      - ecommerce_net

  # Airflow Webserver — F5 · localhost:8088
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ecommerce_airflow_webserver
    restart: on-failure
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9z6xRFkA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-ecommerce-analytics-secret}
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_PORT: "5432"
      DBT_POSTGRES_USER: ${POSTGRES_USER:-admin}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      DBT_POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags # F5.4.3 — mount DAGs
      - ./dbt:/opt/airflow/dbt # Mount dbt project for BashOperator
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ecommerce_net

  # Airflow Scheduler — F5
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: ecommerce_airflow_scheduler
    restart: on-failure
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpahmQ9z6xRFkA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-ecommerce-analytics-secret}
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_PORT: "5432"
      DBT_POSTGRES_USER: ${POSTGRES_USER:-admin}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      DBT_POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt # Mount dbt project for BashOperator
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    networks:
      - ecommerce_net

  # ════════════════════════════════════════════════════════════════════════════
  # LAYER 3 — SERVING
  # ════════════════════════════════════════════════════════════════════════════

  # FastAPI — F7 · localhost:8000
  #  api:
  #    build:
  #      context: ./api
